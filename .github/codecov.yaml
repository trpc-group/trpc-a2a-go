coverage: # https://docs.codecov.com/docs/codecovyml-reference#coverage
  precision: 5
  range:
    - 85.0
    - 90.0
  status:
    project:
      default:
        branches:
          - ^main$
        target: 85.0 # the minimum coverage ratio that the commit must meet to be considered a success.
        threshold: 1% # allow the coverage to drop by X%, and posting a success status.

# Exclude files that are not meaningfully unit-testable from coverage.
ignore:
  # Frozen, verbatim snapshot of the pre-v1.0 protocol types kept for the v0
  # compatibility layer. It is intentionally not unit-tested as a standalone
  # unit; its behavior is exercised through the compat conversion/round-trip
  # tests.
  - "compat/v0/legacy_types.go"
